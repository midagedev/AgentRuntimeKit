name: Feature request
description: Propose a provider, tool, memory, platform, or host-boundary improvement
title: "[Proposal]: "
labels: [proposal, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What integration or safety problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed contract
      description: Describe public API, host responsibility, and failure behavior.
    validations:
      required: true
  - type: textarea
    id: invariants
    attributes:
      label: Security and compatibility considerations
      description: Address credentials, approval, side effects, checkpoints, memory scope, and API compatibility as applicable.
    validations:
      required: true
